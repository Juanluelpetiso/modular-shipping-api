# ══════════════════════════════════════════════════════════════
# Modular Shipping API — Configuración Principal
# Stack: Spring Boot 3.4 + Java 21 + Virtual Threads
# ══════════════════════════════════════════════════════════════

server:
  port: 8080

spring:
  application:
    name: modular-shipping-api

  # ── Java 21 Virtual Threads (Alta concurrencia) ──
  threads:
    virtual:
      enabled: true

  # ── H2 Database (En memoria) ──
  datasource:
    url: jdbc:h2:mem:shippingdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

# ── OpenAPI / Swagger UI ──
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
